<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="液态玻璃风格的 RSS 信息聚合阅读器 · Cloudflare Pages" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Flux · RSS 聚合</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%237dd3fc'/%3E%3Cstop offset='1' stop-color='%23a78bfa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='%230b0d12'/%3E%3Cpath d='M8 18c4 0 6-2 6-6M8 22c7 0 10-3 10-10M8 14c1.5 0 2.5-.8 2.5-2.5' stroke='url(%23g)' stroke-width='2.2' stroke-linecap='round' fill='none'/%3E%3Ccircle cx='8' cy='24' r='1.6' fill='%237dd3fc'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
    <div class="noise"></div>
  </div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar glass" id="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
              <path d="M8 18c4 0 6-2 6-6M8 22c7 0 10-3 10-10M8 14c1.5 0 2.5-.8 2.5-2.5" stroke="url(#bm)" stroke-width="2.4" stroke-linecap="round"/>
              <circle cx="8" cy="24" r="1.8" fill="#7dd3fc"/>
              <defs>
                <linearGradient id="bm" x1="8" y1="10" x2="20" y2="24" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#7dd3fc"/><stop offset="1" stop-color="#a78bfa"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div>
            <div class="brand-name">Flux</div>
            <div class="brand-sub">RSS Aggregate</div>
          </div>
        </div>
        <button type="button" class="icon-btn sidebar-close" id="sidebarClose" aria-label="关闭侧栏">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="section-label">订阅源</div>
        <nav class="feed-nav" id="feedNav" aria-label="订阅源列表">
          <button type="button" class="feed-item is-active" data-id="all">
            <span class="feed-dot all"></span>
            <span class="feed-meta">
              <span class="feed-title">全部文章</span>
              <span class="feed-count" id="countAll">0</span>
            </span>
          </button>
        </nav>
      </div>

      <div class="sidebar-foot">
        <button type="button" class="btn btn-primary btn-block" id="openAddFeed">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          添加订阅
        </button>
        <button type="button" class="btn btn-ghost btn-block" id="refreshAll">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          刷新全部
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar glass">
        <div class="topbar-left">
          <button type="button" class="icon-btn" id="sidebarOpen" aria-label="打开侧栏">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
          </button>
          <div class="page-title-wrap">
            <h1 class="page-title" id="pageTitle">全部文章</h1>
            <p class="page-sub" id="pageSub">聚合你的信息流</p>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="search glass-inset">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input type="search" id="searchInput" placeholder="搜索标题、来源…" autocomplete="off" spellcheck="false" />
            <kbd class="search-kbd" id="searchKbd">/</kbd>
          </div>

          <div class="seg glass-inset" role="group" aria-label="筛选">
            <button type="button" class="seg-btn is-active" data-filter="all">全部</button>
            <button type="button" class="seg-btn" data-filter="unread">未读</button>
            <button type="button" class="seg-btn" data-filter="starred">收藏</button>
          </div>
        </div>
      </header>

      <div class="content">
        <section class="feed-panel" id="listPanel">
          <div class="list-toolbar">
            <div class="status-line" id="statusLine">准备就绪</div>
            <div class="toolbar-actions">
              <button type="button" class="text-btn" id="markAllRead">全部标为已读</button>
            </div>
          </div>

          <div class="article-list" id="articleList" role="list"></div>

          <div class="empty glass" id="emptyState" hidden>
            <div class="empty-icon" aria-hidden="true">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <path d="M4 11a8 8 0 0 1 16 0"/><path d="M4 15a12 12 0 0 1 16 0"/><circle cx="12" cy="19" r="1.2" fill="currentColor" stroke="none"/>
              </svg>
            </div>
            <h2>还没有订阅源</h2>
            <p>添加一个 RSS / Atom 链接，开始聚合信息。</p>
            <button type="button" class="btn btn-primary" id="emptyAdd">添加第一个订阅</button>
          </div>

          <div class="loading-state" id="loadingState" hidden>
            <div class="spinner" aria-hidden="true"></div>
            <span>正在拉取订阅…</span>
          </div>
        </section>

        <section class="reader glass" id="reader" aria-hidden="true">
          <div class="reader-bar">
            <button type="button" class="icon-btn" id="closeReader" aria-label="关闭阅读">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="reader-actions">
              <button type="button" class="icon-btn" id="starBtn" aria-label="收藏" title="收藏">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3.5l2.7 5.5 6 .9-4.3 4.2 1 6-5.4-2.9L6.6 20l1-6L3.3 9.9l6-.9L12 3.5z"/></svg>
              </button>
              <a class="icon-btn" id="openOriginal" href="#" target="_blank" rel="noopener noreferrer" aria-label="打开原文" title="打开原文">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M10 14L20 4"/><path d="M20 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h5"/></svg>
              </a>
            </div>
          </div>
          <article class="reader-body" id="readerBody">
            <div class="reader-meta" id="readerMeta"></div>
            <h2 class="reader-title" id="readerTitle"></h2>
            <div class="reader-content prose" id="readerContent"></div>
          </article>
        </section>
      </div>
    </main>
  </div>

  <!-- Add feed modal -->
  <div class="modal-root" id="modalRoot" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal glass" role="dialog" aria-modal="true" aria-labelledby="modalTitle" id="modal">
      <div class="modal-head">
        <h2 id="modalTitle">添加订阅源</h2>
        <button type="button" class="icon-btn" id="closeModal" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="addFeedForm" class="modal-form" autocomplete="off">
        <label class="field">
          <span class="field-label">RSS / Atom URL</span>
          <div class="field-control glass-inset">
            <input type="url" id="feedUrl" name="url" placeholder="https://example.com/feed.xml" required />
          </div>
        </label>
        <label class="field">
          <span class="field-label">显示名称 <span class="muted">（可选，留空自动识别）</span></span>
          <div class="field-control glass-inset">
            <input type="text" id="feedName" name="name" placeholder="例如：Hacker News" />
          </div>
        </label>
        <div class="preset-row">
          <span class="field-label">快速添加</span>
          <div class="presets" id="presets"></div>
        </div>
        <div class="modal-error" id="modalError" hidden></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancelModal">取消</button>
          <button type="submit" class="btn btn-primary" id="submitFeed">
            <span class="btn-label">添加</span>
            <span class="btn-spinner" hidden></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-root" id="toastRoot" aria-live="polite"></div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
